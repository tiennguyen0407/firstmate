services:
  payment:
    owner_sre: sre-tien
    namespace: production
    k8s_cluster: prod-cluster
    tier: critical
    redis:
      host: redis-prod.internal
      port: 6379
      db: 2
      key_prefix: "session:*"
    database:
      host: pg-prod.internal
      port: 5432
      name: payment_db
      allowed_tables:
        - orders
        - payments
        - refunds

  user-service:
    owner_sre: sre-nam
    namespace: production
    k8s_cluster: prod-cluster
    tier: high
    redis:
      host: redis-prod.internal
      port: 6379
      db: 0
      key_prefix: "user:*"
    database:
      host: pg-prod.internal
      port: 5432
      name: user_db
      allowed_tables:
        - users
        - sessions

runners:
  sre-tien:
    sre_id: tien@company.com
    telegram_id: "@tien_sre"
    services_owned:
      - payment
      - checkout
      - cart
    is_lead: false

  sre-nam:
    sre_id: nam@company.com
    telegram_id: "@nam_sre"
    services_owned:
      - user-service
      - auth
      - notification
    is_lead: false

  sre-lead:
    sre_id: lead@company.com
    telegram_id: "@sre_lead"
    services_owned: []
    is_lead: true

sre_timeout_seconds: 300   # 5 phút không reply → escalate
lead_timeout_seconds: 600  # 10 phút không reply → escalate
